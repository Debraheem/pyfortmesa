[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "py-fortmesa"
version = "0.2.0"
description = "A Python package for running Fortran (specifically MESA) via Python"
readme = "README.md"
requires-python = ">=3.10"
license = "LGPL-3.0-only"
authors = [
  { name = "Ebraheem Farag", email = "ebraheem.farag@yale.edu" }
]
dependencies = ["numpy"]

[project.urls]
Homepage = "https://github.com/Debraheem/py_fortMESA"
Repository = "https://github.com/Debraheem/py_fortMESA"
Issues = "https://github.com/Debraheem/py_fortMESA/issues"

[tool.setuptools.packages.find]
where = ["src"]
include = ["py_fortmesa*"]
